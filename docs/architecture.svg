<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 560" role="img" aria-label="yomilogのアーキテクチャ図">
  <title>yomilogのアーキテクチャ。UIが台帳・集計・チャート・目標・書き出し・テーマの各モジュールを束ね、記録はlocalStorageへ保存する。</title>
  <style>
    svg { --paper: #f3efe6; --box: #faf7f0; --ink: #262019; --muted: #756c5f; --line: #c9bfac; --accent: #2c6a5d; }
    @media (prefers-color-scheme: dark) {
      svg { --paper: #17140f; --box: #1e1a14; --ink: #ece4d6; --muted: #9a9082; --line: #463f33; --accent: #6cb8a6; }
    }
    text { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; fill: var(--ink); }
    .title { font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif; font-size: 17px; font-weight: 600; }
    .name { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; font-weight: 600; }
    .sub { font-size: 10.5px; fill: var(--muted); }
    .label { font-size: 10px; fill: var(--muted); letter-spacing: 0.04em; }
    .box { fill: var(--box); stroke: var(--line); }
    .ext { fill: none; stroke: var(--muted); stroke-dasharray: 5 4; }
    .flow { fill: none; stroke: var(--accent); stroke-width: 1.4; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L8 4L0 8z" fill="var(--accent)"/>
    </marker>
  </defs>

  <rect width="840" height="560" fill="var(--paper)"/>
  <text x="40" y="50" class="title">yomilog のアーキテクチャ</text>
  <line x1="40" y1="66" x2="800" y2="66" stroke="var(--line)"/>

  <!-- UI -->
  <rect class="box" x="40" y="150" width="186" height="200" rx="8"/>
  <text x="133" y="222" text-anchor="middle" font-size="13" font-weight="600">ダッシュボードUI</text>
  <text x="133" y="246" text-anchor="middle" class="name">app.ts</text>
  <text x="133" y="270" text-anchor="middle" class="sub">記録フォーム・サマリ</text>
  <text x="133" y="286" text-anchor="middle" class="sub">一覧・目標・テーマ切替</text>

  <!-- 純粋ロジック群 -->
  <text x="320" y="100" class="label">純粋ロジック(src/lib)</text>
  <g>
    <rect class="box" x="320" y="110" width="232" height="40" rx="6"/>
    <text x="334" y="135" class="name">log.ts</text>
    <text x="538" y="135" text-anchor="end" class="sub">記録の台帳・検証・JSON</text>

    <rect class="box" x="320" y="160" width="232" height="40" rx="6"/>
    <text x="334" y="185" class="name">stats.ts</text>
    <text x="538" y="185" text-anchor="end" class="sub">集計・継続・日次</text>

    <rect class="box" x="320" y="210" width="232" height="40" rx="6"/>
    <text x="334" y="235" class="name">chart.ts</text>
    <text x="538" y="235" text-anchor="end" class="sub">棒・ドーナツ・暦のSVG</text>

    <rect class="box" x="320" y="260" width="232" height="40" rx="6"/>
    <text x="334" y="285" class="name">goal.ts</text>
    <text x="538" y="285" text-anchor="end" class="sub">目標とペース予測</text>

    <rect class="box" x="320" y="310" width="232" height="40" rx="6"/>
    <text x="334" y="335" class="name">filter.ts</text>
    <text x="538" y="335" text-anchor="end" class="sub">絞り込み・並べ替え</text>

    <rect class="box" x="320" y="360" width="232" height="40" rx="6"/>
    <text x="334" y="385" class="name">exporters.ts</text>
    <text x="538" y="385" text-anchor="end" class="sub">CSV・Markdown</text>

    <rect class="box" x="320" y="410" width="232" height="40" rx="6"/>
    <text x="334" y="435" class="name">theme.ts</text>
    <text x="538" y="435" text-anchor="end" class="sub">テーマの解決と保存</text>

    <rect class="box" x="320" y="460" width="232" height="40" rx="6"/>
    <text x="334" y="485" class="name">demo.ts</text>
    <text x="538" y="485" text-anchor="end" class="sub">固定シードのデモ</text>
  </g>

  <!-- 保存先 -->
  <rect class="ext" x="636" y="240" width="150" height="64" rx="8"/>
  <text x="711" y="268" text-anchor="middle" class="name">localStorage</text>
  <text x="711" y="288" text-anchor="middle" class="sub">ブラウザ内に保存</text>

  <!-- UI から各モジュールへ -->
  <path class="flow" d="M226 250 C 270 250 280 130 318 130" marker-end="url(#arrow)"/>
  <path class="flow" d="M226 250 C 270 250 282 180 318 180" marker-end="url(#arrow)"/>
  <path class="flow" d="M226 250 C 274 250 286 230 318 230" marker-end="url(#arrow)"/>
  <path class="flow" d="M226 250 C 274 250 286 280 318 280" marker-end="url(#arrow)"/>
  <path class="flow" d="M226 250 C 270 250 282 330 318 330" marker-end="url(#arrow)"/>
  <path class="flow" d="M226 250 C 270 250 280 380 318 380" marker-end="url(#arrow)"/>
  <path class="flow" d="M226 250 C 266 250 278 430 318 430" marker-end="url(#arrow)"/>
  <path class="flow" d="M226 250 C 262 250 276 480 318 480" marker-end="url(#arrow)"/>

  <!-- 永続化 -->
  <path class="flow" d="M552 130 C 600 130 620 272 634 272" marker-end="url(#arrow)"/>
  <path class="flow" d="M552 285 H 634" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <path class="flow" d="M552 430 C 600 430 620 292 634 292" marker-end="url(#arrow)"/>
  <text x="600" y="232" text-anchor="middle" class="label">JSON</text>
</svg>
